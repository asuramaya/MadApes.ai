name: Publish diary entries

on:
  push:
    branches: [main]
    paths:
      - "thoughts/*.md"
      - ".github/scripts/build_diary_html.py"
      - ".github/scripts/post_socials.py"
  workflow_dispatch:

permissions:
  contents: write   # so the auto-commit of generated HTML + .published.json sticks

concurrency:
  group: publish-diary
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet markdown pyyaml requests requests_oauthlib pynacl

      # Cover/image generation lives on the VM. Photon's
      # ThoughtImageProcessor (photon/src/thought_images.rs) scans
      # thoughts/*.md every 15min for [IMAGE: ...] placeholders, calls
      # Recraft with the canonical realistic_image / 1820x1024 / editorial
      # suffix preset, writes assets/thoughts/<slug>_<idx>.webp, updates
      # assets.json, commits + pushes. Don't reinvent it here.

      - name: Build static HTML pages
        run: python .github/scripts/build_diary_html.py

      - name: Post new entries to X + Telegram
        env:
          X_OAUTH2_CLIENT_ID: ${{ secrets.X_OAUTH2_CLIENT_ID }}
          X_OAUTH2_CLIENT_SECRET: ${{ secrets.X_OAUTH2_CLIENT_SECRET }}
          X_OAUTH2_ACCESS_TOKEN: ${{ secrets.X_OAUTH2_ACCESS_TOKEN }}
          X_OAUTH2_REFRESH_TOKEN: ${{ secrets.X_OAUTH2_REFRESH_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python .github/scripts/post_socials.py

      - name: Commit generated artifacts
        run: |
          git config user.name "MadApes Diary Bot"
          git config user.email "diary-bot@madapesai.com"
          git add thoughts/*.html thoughts/.published.json thoughts/assets.json index.html assets/thoughts/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no generated artifacts to commit"
            exit 0
          fi
          git commit -m "diary: auto-build HTML + covers + published tracker"
          # Pull --rebase to absorb any concurrent pushes (notably photon's
          # image processor running on the VM pushes assets/thoughts/*.webp
          # + assets.json on its own ~15min cadence and races this step).
          # Retry the push up to 3 times in case the rebase target itself
          # races again.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; echo "rebase failed on attempt $attempt"; sleep 5; continue; }
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push rejected on attempt $attempt — retrying"
            sleep 5
          done
          echo "::error::push failed after 3 attempts"
          exit 1
